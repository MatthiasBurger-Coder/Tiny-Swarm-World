commands:
- id: multipass_prepare_repository.001
  index: 1
  description: Check and create 'multipass' group
  intent: check_and_create_multipass_group
  execution_mode: shell
  safety_class: safe_mutation
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters: []
  effects:
  - permission_change
  verify:
    type: command
    description: "Verify after command: Check and create 'multipass' group"
    command: probe:platform:network-addresses
  command: "if ! getent group multipass > /dev/null; then sudo groupadd multipass;\
    \ fi"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_prepare_repository.002
  index: 2
  description: Add current user to 'multipass' group
  intent: add_current_user_to_multipass_group
  execution_mode: shell
  safety_class: safe_mutation
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters: []
  effects:
  - permission_change
  verify:
    type: command
    description: "Verify after command: Add current user to 'multipass' group"
    command: probe:platform:network-addresses
  command: "sudo usermod -aG multipass $(whoami)"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_prepare_repository.003
  index: 3
  description: Set correct permissions for Multipass socket
  intent: set_correct_permissions_for_multipass_socket
  execution_mode: shell
  safety_class: safe_mutation
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters: []
  effects:
  - permission_change
  verify:
    type: command
    description: 'Verify after command: Set correct permissions for Multipass socket'
    command: probe:platform:network-addresses
  command: "sudo chown root:multipass /var/run/multipass_socket || true && sudo chmod\
    \ 660 /var/run/multipass_socket || true"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_prepare_repository.004
  index: 4
  description: Set a Multipass passphrase
  intent: set_a_multipass_passphrase
  execution_mode: shell
  safety_class: credential_mutation
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters: []
  effects:
  - credential_change
  verify:
    type: command
    description: 'Verify after command: Set a Multipass passphrase'
    command: probe:platform:network-addresses
  command: "sudo multipass set local.passphrase='YourSecurePassword'"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"
