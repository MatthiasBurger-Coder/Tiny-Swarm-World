commands:
- id: multipass_init_repository.001
  index: 1
  description: Creating {vm_instance}
  intent: creating_vm_instance
  execution_mode: shell
  safety_class: safe_mutation
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - create
  verify:
    type: command
    description: 'Verify after command: Creating {vm_instance}'
    command: probe:platform:vm-created
  command: "if multipass list >/dev/null 2>&1; then if multipass info {vm_instance} >/dev/null 2>&1; then multipass start {vm_instance}; else multipass launch 24.04 -n {vm_instance} --memory 4G --disk 50G; fi; else list_status=$?; exit $list_status; fi"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_init_repository.002
  index: 2
  description: Getting the IP address of {vm_instance}
  intent: getting_the_ip_address_of_vm_instance
  execution_mode: shell
  safety_class: safe_read
  scope: multipass
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - read
  verify:
    type: none
    description: Read-only command.
  command: "multipass exec {vm_instance} -- ip -4 route show default"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
