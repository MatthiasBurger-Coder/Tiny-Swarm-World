commands:
  - id: multipass_clean_repository.001
    index: 1
    description: Retrive the list of VMs
    intent: retrive_the_list_of_vms
    execution_mode: shell
    safety_class: safe_read
    scope: multipass
    allowed_workflows:
      - platform:reset
      - platform:destroy
    parameters: []
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass list"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "none"

  - id: multipass_clean_repository.002
    index: 2
    description: Deleting all VMs
    intent: deleting_all_vms
    execution_mode: shell
    safety_class: destructive
    scope: multipass
    allowed_workflows:
      - platform:reset
      - platform:destroy
    parameters: []
    effects:
      - delete
    verify:
      type: manual
      description: 'Verify after command: Deleting all VMs'
    command: "multipass delete --all"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "none"

  - id: multipass_clean_repository.004
    index: 4
    description: Purging all VMs
    intent: purging_all_vms
    execution_mode: shell
    safety_class: destructive
    scope: multipass
    allowed_workflows:
      - platform:reset
      - platform:destroy
    parameters: []
    effects:
      - delete
    verify:
      type: manual
      description: 'Verify after command: Purging all VMs'
    command: "multipass purge"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "none"
