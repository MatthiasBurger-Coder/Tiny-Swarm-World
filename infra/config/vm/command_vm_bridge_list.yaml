commands:
  - id: vm_bridge_list.001
    index: 1
    description: Getting current bridge list of multipass
    intent: getting_current_bridge_list_of_multipass
    execution_mode: shell
    safety_class: safe_read
    scope: docker
    allowed_workflows:
      - platform:reconcile
    parameters:
      - vm_instance
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- bash -c \"docker network ls --format\
      \ '{{{{.Name}}}} {{{{.Driver}}}}' | awk '\\$2 == \\\"bridge\\\" {{ print \\\
      $1 }}'\""
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "manager"
