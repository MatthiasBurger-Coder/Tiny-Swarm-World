commands:
  - id: vm_ip_list.001
    index: 1
    description: Getting current ips of each vm
    intent: getting_current_ips_of_each_vm
    execution_mode: shell
    safety_class: safe_read
    scope: docker
    allowed_workflows:
      - platform:reconcile
    parameters:
      - vm_instance
      - docker_bridge
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec  {vm_instance} -- bash -c \"docker network inspect {docker_bridge}\
      \ | jq -r ''.[0].Containers.\"ingress-sbox\".IPv4Address'\""
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "manager"
      - "worker"
