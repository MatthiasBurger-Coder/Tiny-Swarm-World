    route_host: grafana.tsw.local
    required_for_preflight: false
  - id: swagger-ui
    service_id: swagger
    internal_port: 8080
    external_port: 16080
    exposure: diagnostic
    range_id: documentation
    protocol: tcp
    route_host: swagger.tsw.local
    required_for_preflight: false
  - id: openapi-aggregator
    service_id: swagger
    internal_port: 8084
    external_port: 16081
    exposure: diagnostic
    range_id: documentation
    protocol: tcp
    required_for_preflight: false
  - id: infisical-http
    service_id: infisical
    internal_port: 8080
    external_port: 17080
    exposure: diagnostic
    range_id: security-secrets
    protocol: tcp
    route_host: infisical.tsw.local
    required_for_preflight: false
  - id: tiny-swarm-frontend
    service_id: tiny-swarm
    internal_port: 8080
    external_port: 18080
    exposure: diagnostic
    range_id: tiny-services
    protocol: tcp
    required_for_preflight: false
  - id: tiny-swarm-backend
    service_id: tiny-swarm
    internal_port: 8081
    external_port: 18081
    exposure: diagnostic
    range_id: tiny-services
    protocol: tcp
    required_for_preflight: false
  - id: tiny-swarm-agent
