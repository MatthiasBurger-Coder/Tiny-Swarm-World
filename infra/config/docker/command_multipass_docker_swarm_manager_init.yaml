commands:
- id: multipass_docker_swarm_manager_init.001
  index: 1
  description: Initializing Docker Swarm on Manager
  intent: initializing_docker_swarm_on_manager
  execution_mode: shell
  safety_class: network_mutation
  scope: swarm
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - runtime_change
  verify:
    type: command
    description: 'Verify after command: Initializing Docker Swarm on Manager'
    command: probe:platform:swarm-ready
  command: "multipass exec {vm_instance} -- sh -c 'if [ \"$(docker info --format \"{{{{.Swarm.LocalNodeState}}}}\" 2>/dev/null)\" = active ]; then exit 0; fi; docker swarm init --advertise-addr $(hostname -I | cut -d \" \" -f 1)'"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
