commands:
  - id: multipass_docker_verify.001
    index: 1
    description: Verifying Docker is available on {vm_instance}
    intent: verifying_docker_is_available
    execution_mode: shell
    safety_class: safe_read
    scope: docker
    allowed_workflows:
      - platform:init
    parameters:
      - vm_instance
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- sh -c 'docker --version && docker ps >/dev/null'"
    runner: "async"
    command_type: "vm"
    vm_type:
      - "manager"
      - "worker"
