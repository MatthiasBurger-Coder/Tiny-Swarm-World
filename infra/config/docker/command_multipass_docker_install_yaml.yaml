commands:
- id: multipass_docker_install.001
  index: 1
  description: Updating system and fixing broken packages
  intent: updating_system_and_fixing_broken_packages
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - package_install
  verify:
    type: command
    description: 'Verify after command: Updating system and fixing broken packages'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'export DEBIAN_FRONTEND=noninteractive;\
    \ timeout 300 apt-get update && timeout 300 apt-get --fix-broken install -y'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.002
  index: 2
  description: Ensuring required packages are installed
  intent: ensuring_required_packages_are_installed
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - package_install
  - modify
  verify:
    type: command
    description: 'Verify after command: Ensuring required packages are installed'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'export DEBIAN_FRONTEND=noninteractive;\
    \ timeout 300 apt-get install -y apt-transport-https ca-certificates curl software-properties-common\
    \ gnupg2 > /dev/null 2>&1'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.003
  index: 3
  description: Ensuring GPG directory exists
  intent: ensuring_gpg_directory_exists
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - modify
  verify:
    type: command
    description: 'Verify after command: Ensuring GPG directory exists'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'mkdir -p /etc/apt/keyrings'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.004
  index: 4
  description: Removing old Docker GPG key
  intent: removing_old_docker_gpg_key
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - modify
  verify:
    type: command
    description: 'Verify after command: Removing old Docker GPG key'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'rm -f /etc/apt/keyrings/docker.gpg'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.005
  index: 5
  description: Adding Docker GPG key (silent)
  intent: adding_docker_gpg_key_silent
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - modify
  verify:
    type: command
    description: 'Verify after command: Adding Docker GPG key (silent)'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'curl -fsSL https://download.docker.com/linux/ubuntu/gpg\
    \ | gpg --dearmor -o /etc/apt/keyrings/docker.gpg'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.006
  index: 6
  description: Add Docker APT repository
  intent: add_docker_apt_repository
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - modify
  verify:
    type: command
    description: 'Verify after command: Add Docker APT repository'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- bash -c \"echo \\\"deb [arch=\\$(dpkg\
    \ --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu\
    \ \\$(. /etc/os-release && echo \\$VERSION_CODENAME) stable\\\" | sudo tee /etc/apt/sources.list.d/docker.list\
    \ > /dev/null\""
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.007
  index: 7
  description: Updating package list after adding Docker repository
  intent: updating_package_list_after_adding_docker_repository
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - package_install
  verify:
    type: command
    description: 'Verify after command: Updating package list after adding Docker
      repository'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'export DEBIAN_FRONTEND=noninteractive;\
    \ timeout 300 apt-get update > /dev/null 2>&1'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.008
  index: 8
  description: Installing Docker
  intent: installing_docker
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - package_install
  verify:
    type: command
    description: 'Verify after command: Installing Docker'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'if command -v docker >/dev/null\
    \ 2>&1; then exit 0; fi; export DEBIAN_FRONTEND=noninteractive; timeout 300 apt-get\
    \ install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin\
    \ > /dev/null 2>&1'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.009
  index: 9
  description: Verifying Docker installation
  intent: verifying_docker_installation
  execution_mode: shell
  safety_class: safe_read
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - read
  verify:
    type: none
    description: Read-only command.
  command: "multipass exec {vm_instance} -- sudo sh -c 'docker --version'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"

- id: multipass_docker_install.010
  index: 10
  description: Adding current user to docker group
  intent: adding_current_user_to_docker_group
  execution_mode: shell
  safety_class: safe_mutation
  scope: docker
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - permission_change
  verify:
    type: command
    description: 'Verify after command: Adding current user to docker group'
    command: probe:platform:docker-installed
  command: "multipass exec {vm_instance} -- sudo sh -c 'usermod -aG docker $(whoami)'"
  runner: "async"
  command_type: "vm"
  vm_type:
  - "manager"
  - "worker"
