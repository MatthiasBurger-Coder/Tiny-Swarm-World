commands:
  - id: multipass_docker_swarm_manager_ip.001
    index: 1
    description: Getting the ip of the manager
    intent: getting_the_ip_of_the_manager
    execution_mode: shell
    safety_class: safe_read
    scope: swarm
    allowed_workflows:
      - platform:init
      - platform:reconcile
    parameters:
      - vm_instance
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- hostname -I"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "manager"
