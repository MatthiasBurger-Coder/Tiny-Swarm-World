commands:
  - id: multipass_docker_swarm_manager_join_token.001
    index: 1
    description: Getting join-token for the worker
    intent: getting_join_token_for_the_worker
    execution_mode: shell
    safety_class: safe_read
    scope: swarm
    allowed_workflows:
      - platform:init
    parameters:
      - vm_instance
    effects:
      - read
      - credential_output
      - runtime_change
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- docker swarm join-token -q worker"
    runner: "async"
    command_type: "vm"
    vm_type:
      - "manager"
