services:
  portainer:
    image: portainer/portainer-ce:2.39.2
    restart: always
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - service_access_link
    ports:
      - target: 9000
        published: 10001
        protocol: tcp
        mode: host
    deploy:
      mode: replicated # Run only the Portainer service as a replica.
      replicas: 1
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager
  agent:
    image: portainer/agent:2.39.2
    environment:
      AGENT_CLUSTER_ADDR: tasks.agent # Swarm communication.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - service_access_link
    deploy:
      mode: global # Run the agent on every Linux node.
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.platform.os == linux
volumes:
  portainer_data:

networks:
  service_access_link:
    name: service_access_link
    external: true
