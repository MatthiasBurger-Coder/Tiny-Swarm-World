services:
  jenkins:
    image: ${TSW_JENKINS_IMAGE:-127.0.0.1:13500/jenkins:latest}
    user: root
    environment:
      TSW_JENKINS_ADMIN_PASSWORD: ${TSW_JENKINS_ADMIN_PASSWORD}
    volumes:
      - jenkins_home:/var/lib/jenkins
    networks:
      - service_access_link
    ports:
      - target: 8080
        published: 11080
        protocol: tcp
      - target: 50000
        published: 11050
        protocol: tcp
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == swarm-worker-2
volumes:
  jenkins_home:

networks:
  service_access_link:
    name: service_access_link
    external: true
