services:
  jenkins:
    image: ${TSW_JENKINS_IMAGE:-swarm-manager:5000/jenkins:latest}
    user: root
    volumes:
      - jenkins_home:/var/lib/jenkins
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      - target: 50000
        published: 50000
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
volumes:
  jenkins_home:
