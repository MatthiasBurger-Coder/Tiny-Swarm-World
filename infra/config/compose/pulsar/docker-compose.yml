services:
  pulsar:
    image: ${TSW_PULSAR_IMAGE:-apachepulsar/pulsar:3.0.17}
    hostname: pulsar
    environment:
      PULSAR_PREFIX_authenticationEnabled: "true"
      PULSAR_PREFIX_authenticationProviders: org.apache.pulsar.broker.authentication.AuthenticationProviderToken
      PULSAR_PREFIX_advertisedAddress: 127.0.0.1
      PULSAR_PREFIX_ledgerStorageClass: org.apache.bookkeeper.bookie.InterleavedLedgerStorage
      PULSAR_PREFIX_superUserRoles: admin
      PULSAR_PREFIX_tokenSecretKey: data:;base64,${TSW_PULSAR_TOKEN_SECRET_KEY}
      PULSAR_PREFIX_brokerClientAuthenticationPlugin: org.apache.pulsar.client.impl.auth.AuthenticationToken
      PULSAR_PREFIX_brokerClientAuthenticationParameters: token:${TSW_PULSAR_ADMIN_TOKEN}
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
      PULSAR_GC: "-XX:+UseG1GC -XX:+PerfDisableSharedMem"
      PULSAR_GC_LOG: ""
      PULSAR_EXTRA_OPTS: "-Djava.security.egd=file:/dev/./urandom -XX:TieredStopAtLevel=1 -XX:CICompilerCount=2"
      TSW_PULSAR_ADMIN_TOKEN: ${TSW_PULSAR_ADMIN_TOKEN}
    command:
      - sh
      - -lc
      - |
        bin/apply-config-from-env.py conf/standalone.conf
        printf '%s\n' \
          "webServiceUrl=http://localhost:8080" \
          "brokerServiceUrl=pulsar://localhost:6650" \
          "authPlugin=org.apache.pulsar.client.impl.auth.AuthenticationToken" \
          "authParams=token:$${TSW_PULSAR_ADMIN_TOKEN}" \
          > conf/client.conf
        exec bin/pulsar standalone --advertised-address 127.0.0.1 --bookkeeper-port 3181 --no-functions-worker --no-stream-storage
    ports:
      - target: 6650
        published: 14001
        protocol: tcp
      - target: 8080
        published: 14080
        protocol: tcp
    volumes:
      - pulsar-data:/pulsar/data
    networks:
      - service_access_link
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c 'import os, sys, urllib.request; req =
          urllib.request.Request("http://localhost:8080/admin/v2/clusters",
          headers={"Authorization": "Bearer " +
          os.environ["TSW_PULSAR_ADMIN_TOKEN"]}); body =
          urllib.request.urlopen(req, timeout=10).read().decode(); sys.exit(0
          if "standalone" in body else 1)'
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == swarm-worker-1

  pulsar-manager:
    image: ${TSW_PULSAR_MANAGER_IMAGE:-apachepulsar/pulsar-manager:v0.4.0}
    environment:
      SPRING_CONFIGURATION_FILE: /pulsar-manager/pulsar-manager/application.properties
    ports:
      - target: 9527
        published: 14081
        protocol: tcp
    expose:
      - "7750"
    volumes:
      - pulsar-manager-data:/pulsar-manager/pulsar-manager/dbdata
    networks:
      - service_access_link
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == swarm-worker-1

  pulsar-manager-bootstrap:
    image: ${TSW_PULSAR_MANAGER_BOOTSTRAP_IMAGE:-python:3.12-alpine}
    environment:
      TSW_PULSAR_MANAGER_ADMIN_PASSWORD: ${TSW_PULSAR_MANAGER_ADMIN_PASSWORD}
      TSW_PULSAR_MANAGER_BACKEND_URL: http://tasks.pulsar-manager:7750
    command:
      - sh
      - -ec
      - |
        python - <<'PY'
        import json
        import os
        import sys
        import time
        import urllib.request
        import urllib.error

        backend_url = os.environ["TSW_PULSAR_MANAGER_BACKEND_URL"].rstrip("/")
        admin_value = os.environ["TSW_PULSAR_MANAGER_ADMIN_PASSWORD"]
        superuser_payload = json.dumps(
            {
                "name": "admin",
                "password": admin_value,
                "description": "Tiny Swarm World local Pulsar Manager admin",
                "email": "admin@example.org",
            }
        ).encode("utf-8")
        login_payload = json.dumps(
            {
                "username": "admin",
                "password": admin_value,
            }
        ).encode("utf-8")
        backend_host_header = "localhost:7750"
        last_error = "not_attempted"
        for _ in range(180):
            try:
                request = urllib.request.Request(
                    f"{backend_url}/pulsar-manager/csrf-token",
                    headers={"Host": backend_host_header},
                )
                csrf_value = urllib.request.urlopen(request, timeout=5).read().decode("utf-8").strip()
                xsrf_header = "XSRF-" + "TOKEN"
                request = urllib.request.Request(
                    f"{backend_url}/pulsar-manager/login",
                    data=login_payload,
                    method="POST",
                    headers={
                        "Content-Type": "application/json",
                        "Host": backend_host_header,
                        "Cookie": f"{xsrf_header}={csrf_value};",
                        "X-" + xsrf_header: csrf_value,
                    },
                )
                try:
                    body = urllib.request.urlopen(request, timeout=10).read().decode("utf-8")
                    response = json.loads(body or "{}")
                    if response.get("login") == "success":
                        sys.exit(0)
                    if response.get("error") != "The user is not exist":
                        last_error = "login_verification_failed"
                        time.sleep(2)
                        continue
                except urllib.error.HTTPError as exc:
                    if exc.code != 400:
                        raise
                request = urllib.request.Request(
                    f"{backend_url}/pulsar-manager/users/superuser",
                    data=superuser_payload,
                    method="PUT",
                    headers={
                        "Content-Type": "application/json",
                        "Host": backend_host_header,
                        "Cookie": f"{xsrf_header}={csrf_value};",
                        "X-" + xsrf_header: csrf_value,
                    },
                )
                try:
                    body = urllib.request.urlopen(request, timeout=10).read().decode("utf-8")
                    response = json.loads(body or "{}")
                    if response.get("error") not in (None, ""):
                        last_error = "api_rejected_superuser"
                        time.sleep(2)
                        continue
                except urllib.error.HTTPError as exc:
                    if exc.code != 400:
                        raise
                last_error = "superuser_created_waiting_for_login"
                time.sleep(2)
            except urllib.error.HTTPError as exc:
                last_error = f"http_{exc.code}"
                time.sleep(2)
            except Exception as exc:
                last_error = type(exc).__name__
                time.sleep(2)
        raise SystemExit(f"pulsar_manager_bootstrap_failed:{last_error}")
        PY
    networks:
      - service_access_link
    deploy:
      replicas: 1
      update_config:
        failure_action: continue
      restart_policy:
        condition: none
      placement:
        constraints:
          - node.hostname == swarm-worker-1

volumes:
  pulsar-data:
  pulsar-manager-data:

networks:
  service_access_link:
    name: service_access_link
    external: true
