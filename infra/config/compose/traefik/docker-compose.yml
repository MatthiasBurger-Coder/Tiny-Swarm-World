services:
  traefik:
    image: ${TSW_TRAEFIK_IMAGE:-traefik:v3.7.4}
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik_ingress
      - --providers.file.filename=/etc/traefik/dynamic/tls.yml
      - --providers.file.watch=true
    ports:
      - target: 80
        published: 10080
        protocol: tcp
        mode: host
      - target: 443
        published: 10443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: traefik_tls_dynamic_config
        target: /etc/traefik/dynamic/tls.yml
    secrets:
      - source: tsw_traefik_tls_cert
        target: tsw_traefik_tls_cert
      - source: tsw_traefik_tls_key
        target: tsw_traefik_tls_key
    networks:
      - traefik_ingress
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

configs:
  traefik_tls_dynamic_config:
    file: ${TSW_REMOTE_STACK_ROOT:-/var/lib/tiny-swarm-world/stacks}/traefik/dynamic/tls.yml

secrets:
  tsw_traefik_tls_cert:
    external: true
  tsw_traefik_tls_key:
    external: true

networks:
  traefik_ingress:
    name: traefik_ingress
    external: true
