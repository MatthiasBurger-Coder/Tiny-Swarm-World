services:
  swagger-editor:
    image: docker.swagger.io/swaggerapi/swagger-editor
    ports:
      - target: 80
        published: 8082
        protocol: tcp
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-ui:
    image: docker.swagger.io/swaggerapi/swagger-ui
    ports:
      - target: 8080
        published: 8083
        protocol: tcp
    volumes:
      - ${TSW_REMOTE_STACK_ROOT:-/tmp/tiny-swarm-world/stacks}/swagger/swagger/openapi.json:/openapi.json:ro
    environment:
      SWAGGER_JSON: /openapi.json
      # API_URL: ""
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-api:
    image: danielgtaylor/apisprout
    volumes:
      - ${TSW_REMOTE_STACK_ROOT:-/tmp/tiny-swarm-world/stacks}/swagger/swagger/openapi.json:/openapi.json:ro
    command: /openapi.json
    networks:
      swagger_link:
        aliases:
          - local.swagger.apisprout
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-nginx:
    image: nginx:mainline-alpine
    ports:
      - target: 8084
        published: 8084
        protocol: tcp
    volumes:
      - ${TSW_REMOTE_STACK_ROOT:-/tmp/tiny-swarm-world/stacks}/swagger/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      swagger_link:
        aliases:
          - local.swagger.api
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
networks:
  swagger_link:
