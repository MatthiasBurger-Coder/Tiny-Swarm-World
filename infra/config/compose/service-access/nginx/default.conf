map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name local.service-access.dashboard;
  access_log off;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $dashboard_upstream http://tasks.service-access-dashboard:80;

  location = /jenkins {
    return 302 $scheme://$host:8080/;
  }

  location = /jenkins/ {
    return 302 $scheme://$host:8080/;
  }

  location = /nexus {
    return 302 $scheme://$host:8081/;
  }

  location = /nexus/ {
    return 302 $scheme://$host:8081/;
  }

  location = /portainer {
    return 302 $scheme://$host:9000/;
  }

  location = /portainer/ {
    return 302 $scheme://$host:9000/;
  }

  location = /pulsar {
    return 302 $scheme://$host:8087/admin/v2/clusters;
  }

  location = /pulsar/ {
    return 302 $scheme://$host:8087/admin/v2/clusters;
  }

  location = /sonarqube {
    return 302 $scheme://$host:9001/;
  }

  location = /sonarqube/ {
    return 302 $scheme://$host:9001/;
  }

  location = /swagger {
    return 302 $scheme://$host:8084/;
  }

  location = /swagger/ {
    return 302 $scheme://$host:8084/;
  }

  location = /infisical {
    return 302 https://$host/;
  }

  location = /infisical/ {
    return 302 https://$host/;
  }

  location / {
    proxy_pass $dashboard_upstream;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store";
  }
}

server {
  listen 443 ssl;
  server_name local.service-access.infisical localhost;
  access_log off;

  ssl_certificate /etc/nginx/tls/infisical.crt;
  ssl_certificate_key /etc/nginx/tls/infisical.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $infisical_upstream http://tasks.infisical:8080;

  location / {
    proxy_pass $infisical_upstream;
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 8086;
  server_name local.service-access.infisical;
  access_log off;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $infisical_upstream http://tasks.infisical:8080;

  location / {
    proxy_pass $infisical_upstream;
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
