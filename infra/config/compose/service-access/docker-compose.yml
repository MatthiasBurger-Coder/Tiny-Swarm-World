services:
  service-access-dashboard:
    image: ${TSW_SERVICE_ACCESS_DASHBOARD_IMAGE:-127.0.0.1:13500/service-access-dashboard:latest}
    networks:
      - service_access_link
      - traefik_ingress
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.swarm.network=traefik_ingress
        - traefik.http.routers.service-access.rule=Host(`service-access.tsw.local`)
        - traefik.http.routers.service-access.entrypoints=websecure
        - traefik.http.routers.service-access.tls=true
        - traefik.http.services.service-access.loadbalancer.server.port=80

  service-access-nginx:
    image: ${TSW_SERVICE_ACCESS_NGINX_IMAGE:-127.0.0.1:13500/service-access-nginx:latest}
    ports:
      - target: 80
        published: 10000
        protocol: tcp
        mode: host
      - target: 8086
        published: 8086
        protocol: tcp
        mode: host
    networks:
      - service_access_link
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  service_access_link:
    name: service_access_link
    external: true
  traefik_ingress:
    name: traefik_ingress
    external: true
