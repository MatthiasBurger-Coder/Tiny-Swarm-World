services:
  infisical:
    image: ${TSW_INFISICAL_IMAGE:-infisical/infisical:latest}
    environment:
      NODE_ENV: production
      SITE_URL: ${TSW_INFISICAL_SITE_URL:-http://localhost:8086}
      ENCRYPTION_KEY: ${TSW_INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${TSW_INFISICAL_AUTH_SECRET}
      INITIAL_BOOTSTRAP_ADMIN_EMAIL: ${TSW_INFISICAL_LOGIN_EMAIL}
      INITIAL_BOOTSTRAP_ADMIN_FIRST_NAME: ${TSW_INFISICAL_ADMIN_FIRST_NAME:-Tiny}
      INITIAL_BOOTSTRAP_ADMIN_LAST_NAME: ${TSW_INFISICAL_ADMIN_LAST_NAME:-Admin}
      INITIAL_BOOTSTRAP_ADMIN_PASSWORD: ${TSW_INFISICAL_BOOTSTRAP_ADMIN_PASSWORD}
      DB_CONNECTION_URI: postgres://${TSW_INFISICAL_POSTGRES_USER:-infisical}:${TSW_INFISICAL_POSTGRES_PASSWORD}@tasks.infisical-db:5432/${TSW_INFISICAL_POSTGRES_DB:-infisical}
      REDIS_URL: redis://tasks.infisical-redis:6379
    volumes:
      - infisical_uploads:/app/infisical/uploads
    networks:
      - service_access_link
      - traefik_ingress
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.swarm.network=traefik_ingress
        - traefik.http.routers.infisical.rule=Host(`infisical.tsw.local`) || Host(`localhost`)
        - traefik.http.routers.infisical.entrypoints=websecure
        - traefik.http.routers.infisical.tls=true
        - traefik.http.services.infisical.loadbalancer.server.port=8080
      placement:
        constraints:
          - node.role == manager

  infisical-db:
    image: ${TSW_INFISICAL_POSTGRES_IMAGE:-postgres:14-alpine}
    environment:
      POSTGRES_USER: ${TSW_INFISICAL_POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${TSW_INFISICAL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TSW_INFISICAL_POSTGRES_DB:-infisical}
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - service_access_link
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  infisical-redis:
    image: ${TSW_INFISICAL_REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - infisical_redis_data:/data
    networks:
      - service_access_link
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  infisical_pg_data:
  infisical_redis_data:
  infisical_uploads:

networks:
  service_access_link:
    name: service_access_link
    external: true
  traefik_ingress:
    name: traefik_ingress
    external: true
