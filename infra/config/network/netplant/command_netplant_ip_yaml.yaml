commands:
  - id: netplant_ip.001
    index: 1
    description: Getting the gateway of the manager
    intent: getting_the_gateway_of_the_manager
    execution_mode: shell
    safety_class: safe_read
    scope: network
    allowed_workflows:
      - platform:init
    parameters:
      - vm_instance
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- ip -4 route show default"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "manager"

  - id: netplant_ip.002
    index: 2
    description: Getting the ip of the manager
    intent: getting_the_ip_of_the_manager
    execution_mode: shell
    safety_class: safe_read
    scope: network
    allowed_workflows:
      - platform:init
    parameters:
      - vm_instance
    effects:
      - read
    verify:
      type: none
      description: Read-only command.
    command: "multipass exec {vm_instance} -- hostname -I"
    runner: "async"
    command_type: "hostos"
    vm_type:
      - "manager"
