commands:
- id: netplant_setup.001
  index: 1
  description: Install socat
  intent: install_socat
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters: []
  effects:
  - network_change
  - package_install
  verify:
    type: command
    description: 'Verify after command: Install socat'
    command: probe:platform:netplan-applied
  command: "if command -v socat >/dev/null 2>&1; then exit 0; fi; timeout 300 sudo -n env DEBIAN_FRONTEND=noninteractive apt-get update && timeout 300 sudo -n env DEBIAN_FRONTEND=noninteractive apt-get install -y socat"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "none"

- id: netplant_setup.002
  index: 2
  description: Delete all existing netplan file_management
  intent: delete_all_existing_netplan_file_management
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - modify
  verify:
    type: command
    description: 'Verify after command: Delete all existing netplan file_management'
    command: probe:platform:netplan-applied
  command: "multipass exec {vm_instance} -- sudo sh -c 'rm -f /etc/netplan/*.yaml'"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"

- id: netplant_setup.003
  index: 3
  description: Transfer the file to the instance
  intent: transfer_the_file_to_the_instance
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - modify
  verify:
    type: command
    description: 'Verify after command: Transfer the file to the instance'
    command: probe:platform:netplan-applied
  command: "multipass transfer .tiny-swarm-world/generated/cloud-init-manager.yaml {vm_instance}:/tmp/netplan.yaml"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"

- id: netplant_setup.004
  index: 4
  description: Move the file to /etc/netplan
  intent: move_the_file_to_etc_netplan
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - modify
  verify:
    type: command
    description: 'Verify after command: Move the file to /etc/netplan'
    command: probe:platform:netplan-applied
  command: "multipass exec {vm_instance} -- sudo mv /tmp/netplan.yaml /etc/netplan/netplan.yaml"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"

- id: netplant_setup.005
  index: 5
  description: Assign file ownership to root
  intent: assign_file_ownership_to_root
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - permission_change
  verify:
    type: command
    description: 'Verify after command: Assign file ownership to root'
    command: probe:platform:netplan-applied
  command: "multipass exec {vm_instance} -- sudo chown root:root /etc/netplan/netplan.yaml"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"

- id: netplant_setup.006
  index: 6
  description: Set permissions
  intent: set_permissions
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - permission_change
  verify:
    type: command
    description: 'Verify after command: Set permissions'
    command: probe:platform:netplan-applied
  command: "multipass exec {vm_instance} -- sudo chmod 600 /etc/netplan/netplan.yaml"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"

- id: netplant_setup.007
  index: 7
  description: Apply netplan
  intent: apply_netplan
  execution_mode: shell
  safety_class: network_mutation
  scope: network
  allowed_workflows:
  - platform:init
  parameters:
  - vm_instance
  effects:
  - network_change
  - runtime_change
  verify:
    type: command
    description: 'Verify after command: Apply netplan'
    command: probe:platform:netplan-applied
  command: "multipass exec {vm_instance} -- sudo netplan apply"
  runner: "async"
  command_type: "hostos"
  vm_type:
  - "manager"
