secrets:
  - key: TSW_INFISICAL_ENCRYPTION_KEY
    service: infisical
    type: generated_secret
    environment: local
    description: Infisical encryption key used by the self-hosted local stack
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_INFISICAL_AUTH_SECRET
    service: infisical
    type: generated_secret
    environment: local
    description: Infisical auth secret used by the self-hosted local stack
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_INFISICAL_LOGIN_EMAIL
    service: infisical
    type: placeholder_only
    environment: local
    description: Infisical bootstrap admin login email provided by the operator
    source: placeholder_only
    required: true
    policy: keep_existing
  - key: TSW_INFISICAL_BOOTSTRAP_ADMIN_PASSWORD
    service: infisical
    type: generated_secret
    environment: local
    description: Initial Infisical bootstrap admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_INFISICAL_BOOTSTRAP_TOKEN
    service: infisical
    type: generated_secret
    environment: local
    description: Infisical bootstrap identity token used for idempotent local secret sync
    source: infisical_bootstrap_identity
    required: false
    policy: keep_existing
  - key: TSW_INFISICAL_POSTGRES_PASSWORD
    service: infisical
    type: generated_secret
    environment: local
    description: PostgreSQL password for the Infisical database
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_INFISICAL_REDIS_PASSWORD
    service: infisical
    type: generated_secret
    environment: local
    description: Redis password reserved for Infisical local runtime compatibility and recovery exports
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_POSTGRES_PASSWORD
    service: postgres
    type: generated_secret
    environment: local
    description: PostgreSQL password used by local Tiny Swarm World services
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_REDIS_PASSWORD
    service: redis
    type: generated_secret
    environment: local
    description: Redis password used by local Tiny Swarm World services when Redis auth is enabled
    source: generated_local_secret
    required: false
    policy: keep_existing
  - key: TSW_JENKINS_ADMIN_PASSWORD
    service: jenkins
    type: generated_secret
    environment: local
    description: Jenkins initial admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_NEXUS_ADMIN_PASSWORD
    service: nexus
    type: generated_secret
    environment: local
    description: Nexus admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_SONARQUBE_ADMIN_PASSWORD
    service: sonarqube
    type: generated_secret
    environment: local
    description: SonarQube admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_SONARQUBE_POSTGRES_PASSWORD
    service: sonarqube
    type: generated_secret
    environment: local
    description: SonarQube PostgreSQL password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_PORTAINER_ADMIN_PASSWORD
    service: portainer
    type: generated_secret
    environment: local
    description: Portainer admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_PULSAR_TOKEN_SECRET_KEY
    service: pulsar
    type: generated_secret
    environment: local
    description: Base64 encoded HS256 key used to sign local Pulsar Admin API tokens
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_PULSAR_ADMIN_TOKEN
    service: pulsar
    type: generated_secret
    environment: local
    description: JWT bearer token for the local Pulsar Admin API
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_PULSAR_MANAGER_ADMIN_PASSWORD
    service: pulsar
    type: generated_secret
    environment: local
    description: Pulsar Manager UI admin password
    source: generated_local_secret
    required: true
    policy: keep_existing
  - key: TSW_REGISTRY_HTPASSWD
    service: registry
    type: generated_secret
    environment: local
    description: Docker registry htpasswd material
    source: generated_local_secret
    required: false
    policy: keep_existing
  - key: TSW_GRAFANA_ADMIN_PASSWORD
    service: grafana
    type: generated_secret
    environment: local
    description: Grafana admin password for future local observability stack
    source: generated_local_secret
    required: false
    policy: keep_existing
  - key: TSW_PROMETHEUS_BASIC_AUTH_PASSWORD
    service: prometheus
    type: generated_secret
    environment: local
    description: Prometheus basic auth password for future local observability stack
    source: generated_local_secret
    required: false
    policy: keep_existing
  - key: TSW_TRAEFIK_TLS_CERT_SECRET_NAME
    service: traefik
    type: external_user_secret
    environment: local
    description: Docker secret name containing the operator-provided Traefik TLS certificate
    source: external_user_secret
    required: true
    policy: keep_existing
  - key: TSW_TRAEFIK_TLS_KEY_SECRET_NAME
    service: traefik
    type: external_user_secret
    environment: local
    description: Docker secret name containing the operator-provided Traefik TLS private key
    source: external_user_secret
    required: true
    policy: keep_existing
