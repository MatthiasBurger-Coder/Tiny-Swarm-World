services:
  swagger-editor:
    image: swaggerapi/swagger-editor
    ports:
      - target: 8080
        published: 8082
        protocol: tcp
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - target: 8080
        published: 8083
        protocol: tcp
    volumes:
      - ./swagger/openapi.json:/openapi.json
    environment:
      SWAGGER_JSON: /openapi.json
      # API_URL: ""
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-api:
    image: danielgtaylor/apisprout
    ports:
      - target: 8000
        published: 8084
        protocol: tcp
    volumes:
      - ./swagger/openapi.json:/openapi.json
    command: /openapi.json
    networks:
      swagger_link:
        aliases:
          - local.swagger.apisprout
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  swagger-nginx:
    image: 127.0.0.1:5000/swagger-nginx:latest
    ports:
      - target: 8084
        published: 80
        protocol: tcp
    depends_on:
      - swagger-api
    networks:
      swagger_link:
        aliases:
          - local.swagger.api
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
networks:
  swagger_link:
