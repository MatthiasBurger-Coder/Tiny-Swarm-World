map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 8085;
  server_name local.service-access.dashboard;
  access_log off;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $dashboard_upstream http://service-access-dashboard:80;

  location / {
    proxy_pass $dashboard_upstream;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store";
  }
}

server {
  listen 8086;
  server_name local.service-access.vaultwarden;
  access_log off;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $vaultwarden_upstream http://vaultwarden:80;

  location / {
    proxy_pass $vaultwarden_upstream;
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
