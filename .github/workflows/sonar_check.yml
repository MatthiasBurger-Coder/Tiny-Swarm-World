name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonarcloud:
    name: Python Quality And SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || secrets.SONAR_CLOUD_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache SonarCloud Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install coverage import-linter mypy pytest ruff types-PyYAML types-requests

      - name: Quality Gate
        run: python3 tools/quality_gate.py quality

      - name: Generate Coverage Report
        run: |
          PYTHONPATH=src python3 -m coverage run --branch -m unittest discover -s tests -t .
          coverage xml -o coverage.xml

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8

      - name: Skip SonarCloud Scan
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "SONAR_TOKEN or SONAR_CLOUD_TOKEN is not configured; skipping SonarCloud upload."
